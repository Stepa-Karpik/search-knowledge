services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: search
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search -d search"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:5534:5432"
  migrator:
    build: .
    env_file: [.env]
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
  api:
    build: .
    env_file: [.env]
    depends_on:
      migrator:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8340:8340"
    networks:
      default:
      ecosystem:
        aliases: [search-knowledge]

networks:
  ecosystem:
    external: true
