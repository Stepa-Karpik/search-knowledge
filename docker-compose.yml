services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: search
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search
    ports:
      - "127.0.0.1:5534:5432"
  migrator:
    build: .
    env_file: [.env]
    command: ["alembic", "upgrade", "head"]
    depends_on: [postgres]
  api:
    build: .
    env_file: [.env]
    depends_on: [migrator]
    ports:
      - "127.0.0.1:8340:8340"
    networks:
      default:
      ecosystem:
        aliases: [search-knowledge]

networks:
  ecosystem:
    external: true
